<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upscale Cafe | Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        luxuryGold: '#D4AF37',
                        darkBg: '#121212',
                        surfaceCard: '#1E1E1E'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased pb-24">

    <header class="p-6 text-center border-b border-zinc-800">
        <h1 class="text-3xl font-serif tracking-widest text-luxuryGold uppercase">The Upscale Cafe</h1>
        <p class="text-xs text-zinc-400 mt-1 tracking-wider">EST. 2026</p>
        
        <div class="flex justify-center gap-4 mt-4">
            <button onclick="toggleModal('wifi-modal')" class="bg-zinc-800 hover:bg-zinc-700 text-xs text-luxuryGold px-4 py-2 rounded-full border border-luxuryGold/30 flex items-center gap-2 transition">
                <i class="fas fa-wifi"></i> Wi-Fi Password
            </button>
            <button onclick="callWaiter()" class="bg-luxuryGold hover:bg-amber-600 text-xs text-darkBg font-bold px-4 py-2 rounded-full flex items-center gap-2 transition">
                <i class="fas fa-bell"></i> Call Waiter
            </button>
        </div>
    </header>

    <nav class="sticky top-0 bg-darkBg/90 backdrop-blur-md z-40 border-b border-zinc-800/80 py-3 px-4">
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2 text-sm justify-start md:justify-center">
            <button onclick="filterCategory('all')" class="cat-btn active bg-luxuryGold text-darkBg font-medium px-4 py-1.5 rounded-full whitespace-nowrap">All</button>
            <button onclick="filterCategory('starters')" class="cat-btn bg-zinc-800 text-zinc-300 px-4 py-1.5 rounded-full whitespace-nowrap">Starters</button>
            <button onclick="filterCategory('mains')" class="cat-btn bg-zinc-800 text-zinc-300 px-4 py-1.5 rounded-full whitespace-nowrap">Mains</button>
            <button onclick="filterCategory('drinks')" class="cat-btn bg-zinc-800 text-zinc-300 px-4 py-1.5 rounded-full whitespace-nowrap">Drinks</button>
        </div>

        <div class="flex gap-2 justify-start md:justify-center mt-2 text-xs border-t border-zinc-800/50 pt-2 overflow-x-auto">
            <button onclick="toggleDietaryTag('vegan')" class="tag-btn border border-zinc-700 text-zinc-400 px-3 py-1 rounded-full">🌿 Vegan</button>
            <button onclick="toggleDietaryTag('gluten-free')" class="tag-btn border border-zinc-700 text-zinc-400 px-3 py-1 rounded-full">🌾 Gluten-Free</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-full text-center text-zinc-500 py-12">Loading exquisite dishes...</div>
        </div>
    </main>

    <div id="wifi-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-surfaceCard p-6 rounded-2xl border border-zinc-800 max-w-sm w-full text-center">
            <i class="fas fa-wifi text-4xl text-luxuryGold mb-3"></i>
            <h3 class="text-xl font-bold mb-2">Guest Wi-Fi</h3>
            <p class="text-sm text-zinc-400 mb-4">Network: <span class="text-white font-mono">Upscale_Guest</span></p>
            <div class="bg-zinc-900 p-3 rounded-lg mb-4 flex justify-between items-center font-mono text-sm">
                <span id="wifi-pass">LuxuryCafe2026</span>
                <button onclick="copyWifi()" class="text-luxuryGold hover:text-white"><i class="far fa-copy"></i></button>
            </div>
            <button onclick="toggleModal('wifi-modal')" class="text-sm text-zinc-400 underline">Close</button>
        </div>
    </div>

    <script type="module">
        // Import Sanity Client directly via URL distribution for HTML apps
        import { createClient } from 'https://esm.sh/@sanity/client@6.15.0';

        const client = createClient({
            projectId: 'wh9grpj3', // Replace with your real Sanity Project ID
            dataset: 'production',
            useCdn: true, 
            apiVersion: '2026-07-09'
        });

        let allItems = [];
        let currentCategory = 'all';
        let activeDietaryTags = [];

        // Fetch Data from Sanity using GROQ
        async function fetchMenu() {
            const query = `*[_type == "menuItem" && isAvailable == true]{
                name,
                price,
                description,
                category,
                tags,
                "imageUrl": image.asset->url
            }`;
            
            try {
                allItems = await client.fetch(query);
                renderMenu();
            } catch (error) {
                console.error("Error fetching data from Sanity:", error);
                document.getElementById('menu-container').innerHTML = '<p class="text-red-400 col-span-full text-center">Failed to load menu. Please try refreshing.</p>';
            }
        }

        // Render Cards dynamically 
        window.renderMenu = function() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            const filtered = allItems.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesTags = activeDietaryTags.every(tag => item.tags && item.tags.includes(tag));
                return matchesCategory && matchesTags;
            });

            if(filtered.length === 0) {
                container.innerHTML = '<p class="text-zinc-500 col-span-full text-center py-8">No dishes match your filters.</p>';
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-surfaceCard rounded-xl overflow-hidden shadow-lg border border-zinc-800/60 flex h-32";
                
                // Dietary highlights string
                const tagBadges = item.tags ? item.tags.map(t => `<span class="bg-zinc-800 text-luxuryGold text-[10px] px-1.5 py-0.5 rounded">${t}</span>`).join(' ') : '';

                card.innerHTML = `
                    <div class="w-1/3 h-full relative bg-zinc-900">
                        <img src="${item.imageUrl || 'https://via.placeholder.com/150'}" alt="${item.name}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="w-2/3 p-4 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <h4 class="font-bold text-sm md:text-base text-zinc-100">${item.name}</h4>
                                <span class="text-luxuryGold font-serif font-bold text-sm">$${item.price.toFixed(2)}</span>
                            </div>
                            <p class="text-xs text-zinc-400 line-clamp-2 mt-1">${item.description || ''}</p>
                        </div>
                        <div class="flex gap-1 mt-1">${tagBadges}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Filter Handlers globally exposed
        window.filterCategory = function(category) {
            currentCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-luxuryGold', 'text-darkBg', 'font-medium');
                btn.classList.add('bg-zinc-800', 'text-zinc-300');
            });
            event.target.classList.remove('bg-zinc-800', 'text-zinc-300');
            event.target.classList.add('bg-luxuryGold', 'text-darkBg', 'font-medium');
            renderMenu();
        }

        window.toggleDietaryTag = function(tag) {
            const index = activeDietaryTags.indexOf(tag);
            if(index > -1) {
                activeDietaryTags.splice(index, 1);
                event.target.classList.remove('bg-luxuryGold/20', 'text-luxuryGold', 'border-luxuryGold');
                event.target.classList.add('border-zinc-700', 'text-zinc-400');
            } else {
                activeDietaryTags.push(tag);
                event.target.classList.add('bg-luxuryGold/20', 'text-luxuryGold', 'border-luxuryGold');
                event.target.classList.remove('border-zinc-700', 'text-zinc-400');
            }
            renderMenu();
        }

        // Kick off fetch on load
        fetchMenu();
    </script>

    <script>
        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        function copyWifi() {
            const pass = document.getElementById('wifi-pass').innerText;
            navigator.clipboard.writeText(pass);
            alert('Wi-Fi Password copied to clipboard!');
        }

        function callWaiter() {
            alert('🔔 Waiter has been notified. A team member will be with you shortly.');
        }
    </script>
</body>
</html>
